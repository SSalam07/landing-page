<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | GREENSPUN NATURESTAY RESORT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --forest-green: #1a3a32; --light-cream: #f8f9fa; }
        body { background-color: var(--light-cream); font-family: 'Inter', sans-serif; }
        .sidebar { width: 280px; height: 100vh; background: var(--forest-green); color: white; position: fixed; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-link { color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #2d5a4c; color: white; }
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .card { border: none; border-radius: 15px; shadow: 0 4px 12px rgba(0,0,0,0.05); }
        .form-switch .form-check-input { width: 3em; height: 1.5em; }
        @media (max-width: 768px) {
            .sidebar { position: relative; width: 100%; height: auto; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column">
        <div class="p-4 border-bottom border-secondary text-center">
            <img src="logo.jpeg" alt="GREENSPUN NATURESTAY RESORT" class="img-fluid mb-2" style="max-height: 80px;">
            <h4 class="fw-bold mb-0 mt-2" style="color: #2d5a4c;">GREENSPUN</h4>
            <small class="text-success tracking-widest" style="font-size: 0.65rem;">NATURESTAY RESORT</small>
        </div>
        <div class="nav flex-column mt-3 flex-grow-1">
            <a href="manage_rooms.html" class="nav-link"><i class="bi bi-door-open me-2"></i> Manage Rooms</a>
            <a href="manage_gallery.html" class="nav-link"><i class="bi bi-images me-2"></i> Manage Gallery</a>
            <a href="booking_details.html" class="nav-link"><i class="bi bi-calendar3 me-2"></i> Booking Details</a>
            <a href="settings.html" class="nav-link active"><i class="bi bi-gear me-2"></i> Settings</a>
        </div>
        <div class="p-3 border-top border-secondary">
            <a href="#" class="nav-link text-danger" onclick="showLogoutModal(event)"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
        </div>
    </div>
    <div class="main-content">
        <h2 class="fw-bold mb-4"><i class="bi bi-gear me-2"></i>System Settings</h2>
        
        <!-- Property Information -->
        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3"><i class="bi bi-building me-2"></i>Property Information</h5>
            <form>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Property Name</label>
                        <input type="text" class="form-control" value="GREENSPUN NATURESTAY RESORT">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Property Type</label>
                        <select class="form-select">
                            <option>Resort</option>
                            <option selected>Nature Stay</option>
                            <option>Hotel</option>
                            <option>Homestay</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Contact Number</label>
                        <div class="input-group">
                            <span class="input-group-text">+91</span>
                            <input type="tel" class="form-control" value="91080 12035">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" value="info@greenspunnaturestay.com">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="2">Beach Road, Near Lighthouse, Kovalam, Thiruvananthapuram, Kerala 695527</textarea>
                </div>
            </form>
        </div>

        <!-- Booking Settings -->
        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3"><i class="bi bi-calendar-check me-2"></i>Booking Settings</h5>
            <form>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Check-In Time</label>
                        <input type="time" class="form-control" value="12:00">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Check-Out Time</label>
                        <input type="time" class="form-control" value="11:00">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Minimum Stay (nights)</label>
                        <input type="number" class="form-control" value="1" min="1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Maximum Stay (nights)</label>
                        <input type="number" class="form-control" value="30" min="1">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Cancellation Policy</label>
                    <select class="form-select">
                        <option>Free cancellation up to 48 hours before check-in</option>
                        <option selected>Free cancellation up to 24 hours before check-in</option>
                        <option>Non-refundable</option>
                    </select>
                </div>
            </form>
        </div>

        <!-- House Rules -->
        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3"><i class="bi bi-exclamation-triangle me-2"></i>House Rules</h5>
            <form>
                <div class="mb-3">
                    <label class="form-label">General Rules</label>
                    <textarea class="form-control" rows="3">No smoking inside rooms. Quiet hours from 10 PM to 7 AM. No pets allowed. Check-in requires valid ID proof.</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Additional Rules</label>
                    <textarea class="form-control" rows="2">Guests are requested to maintain cleanliness. Alcohol consumption is restricted to designated areas.</textarea>
                </div>
            </form>
        </div>

        <!-- Notification Settings -->
        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3"><i class="bi bi-bell me-2"></i>Notification Settings</h5>
            <div class="form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="emailNotify" checked>
                <label class="form-check-label ms-2" for="emailNotify">Email notifications for new bookings</label>
            </div>
            <div class="form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="smsNotify" checked>
                <label class="form-check-label ms-2" for="smsNotify">SMS notifications for booking updates</label>
            </div>
            <div class="form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="dailyReport">
                <label class="form-check-label ms-2" for="dailyReport">Daily occupancy report</label>
            </div>
            <div class="form-switch">
                <input class="form-check-input" type="checkbox" id="promoNotify">
                <label class="form-check-label ms-2" for="promoNotify">Promotional offers notifications</label>
            </div>
        </div>

        <!-- Payment Settings -->
        <div class="card p-4 shadow-sm mb-4">
            <h5 class="mb-3"><i class="bi bi-credit-card me-2"></i>Payment Settings</h5>
            <form>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Currency</label>
                        <select class="form-select">
                            <option selected>INR (₹)</option>
                            <option>USD ($)</option>
                            <option>EUR (€)</option>
                            <option>GBP (£)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Payment Methods</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="cash" checked>
                            <label class="form-check-label" for="cash">Cash</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="upi" checked>
                            <label class="form-check-label" for="upi">UPI/QR Code</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="card" checked>
                            <label class="form-check-label" for="card">Card Payment</label>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- Save Button -->
        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-secondary">Cancel</button>
            <button class="btn btn-success" onclick="saveSettings()">
                <i class="bi bi-check-circle me-1"></i> Save All Settings
            </button>
        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div class="modal fade" id="logoutModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-box-arrow-right me-2"></i>Logout</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="mb-0"><i class="bi bi-exclamation-triangle text-warning display-4"></i></p>
                    <p class="mt-3">Are you sure you want to logout?</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmLogout()">
                        <i class="bi bi-box-arrow-right"></i> Yes, Logout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Alert -->
    <div class="alert alert-success position-fixed top-0 end-0 m-3" id="successAlert" style="display: none; z-index: 9999;">
        <i class="bi bi-check-circle-fill me-2"></i><span id="successMessage">Settings saved successfully!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show logout confirmation modal
        function showLogoutModal(event) {
            event.preventDefault();
            bootstrap.Modal.getOrCreateInstance(document.getElementById('logoutModal')).show();
        }
        
        // Confirm logout
        function confirmLogout() {
            window.location.href = 'login.html';
        }
        
        // Save Settings function
        function saveSettings() {
            showSuccess('Settings saved successfully!');
        }

        // Show success message
        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            document.getElementById('successMessage').textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
